name: Sync Trending AI

on:
  schedule:
    - cron: '0 0 */3 * *'  # 3일마다 UTC 00:00 = KST 09:00
  workflow_dispatch:       # 수동 실행 가능

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect data
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/collect.py

      - name: Clone and analyze top 5 repos
        env:
          GH_TOKEN: ${{ secrets.WORK_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/clone_repos.py

      - name: Generate README
        run: python scripts/generate_readme.py

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.WORK_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "sync: $(date +'%Y-%m-%d') trending AI update"
          git push
